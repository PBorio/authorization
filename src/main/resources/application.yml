spring:
  config:
    activate:
      on-profile: default

# datasource
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:alura-forum
    username: sa
    password:

  # jpa
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate.ddl-auto: update

  # h2
  h2:
    console:
      enabled: true
      path: /h2-console
