spring:
  config:
    activate:
      on-profile: default

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.xml

# datasource
#  datasource:
    #    driverClassName: org.h2.Driver
    #url: jdbc:h2:mem:master
    #username: sa
    #password:

  # jpa
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate.ddl-auto: update

  # h2
  h2:
    console:
      enabled: true
      path: /h2-console

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true



encryption:
  secret: verySecret
  salt: jozo

logging:
  level:
    root: WARN
    com:
      borio: TRACE
